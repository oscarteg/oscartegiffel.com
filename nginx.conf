server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Static site — only allow GET and HEAD
    if ($request_method !~ ^(GET|HEAD)$) {
        return 444;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }

    # Uniform 404 response — don't leak path existence
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
}
